apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kia-poller
spec:
  interval: 1h
  timeout: 3m
  retryInterval: 10s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/kia-poller
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
