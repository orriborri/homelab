apiVersion: batch/v1
kind: CronJob
metadata:
  name: kia-influx-poller
  namespace: default
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 120
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: poller
              image: ghcr.io/orriborri/kia-poller:latest
              args: ["/app/poller.py", "--once"]
              envFrom:
                - secretRef:
                    name: kia-poller
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kia-pg-poller
  namespace: default
spec:
  schedule: "30 23 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: pg-poller
              image: ghcr.io/orriborri/kia-poller:latest
              args: ["/app/pg_poller.py"]
              envFrom:
                - secretRef:
                    name: kia-poller
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
